services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radiantview
      POSTGRES_USER: radiantview
      POSTGRES_PASSWORD: radiantview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiantview -d radiantview"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: jodogne/orthanc-plugins:latest
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__REMOTE_ACCESS_ALLOWED: "true"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  orthanc-data:
